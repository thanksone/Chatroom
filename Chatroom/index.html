<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTHU Chatroom Midterm</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="auth-container" class="overlay">
    <section class="auth-box card">
      <h1>Chatroom Login</h1>
      <p class="hint">Sign up or sign in with email/password.</p>
      <input type="email" id="email" placeholder="Email" autocomplete="email" />
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
      <div class="auth-buttons">
        <button id="login-btn">Sign In</button>
        <button id="signup-btn" class="secondary">Sign Up</button>
      </div>
      <p id="auth-error" class="error-text"></p>
    </section>
  </div>

  <div id="app" class="hidden">
    <aside id="sidebar">
      <div class="profile-summary">
        <img id="user-avatar" src="https://placehold.co/80x80?text=Me" alt="Avatar" />
        <div class="profile-text">
          <strong id="display-name">Username</strong>
          <small id="display-email"></small>
        </div>
        <button id="open-profile" class="small">Edit</button>
        <button id="notify-btn" class="small secondary">Notify</button>
        <button id="logout-btn" class="small secondary">Logout</button>
      </div>

      <div class="room-tools">
        <input type="email" id="invite-email" placeholder="Friend email" />
        <button id="create-room-btn">Create Direct Room</button>
        <button id="invite-room-btn" class="secondary" disabled>Invite To Current Room</button>
        <div class="block-buttons">
          <button id="block-user-btn" class="secondary">Block User</button>
          <button id="unblock-user-btn" class="secondary">Unblock User</button>
        </div>
      </div>
      <div id="room-list"></div>
    </aside>

    <main id="chat-area">
      <header id="chat-header">
        <div>
          <h2 id="current-room-name">Select a chat</h2>
          <small id="room-members"></small>
          <small id="block-warning" class="warning-text"></small>
        </div>
        <input id="search-input" type="search" placeholder="Search messages" />
      </header>

      <div id="messages"></div>

      <div id="reply-preview" class="hidden">
        <div class="reply-content">
          <small>Replying to:</small>
          <p id="reply-text"></p>
        </div>
        <button id="cancel-reply" class="small">×</button>
      </div>

      <div id="input-area">
        <button id="emoji-btn" class="round" title="Insert emoji">😊</button>
        <label class="file-btn" title="Send image">🖼️<input type="file" id="image-input" accept="image/*" /></label>
        <input type="text" id="msg-input" placeholder="Type a message..." />
        <button id="send-btn">Send</button>
      </div>

      <div id="emoji-picker" class="hidden">
        <span class="emoji-item">❤️</span><span class="emoji-item">😆</span>
        <span class="emoji-item">😮</span><span class="emoji-item">😢</span>
        <span class="emoji-item">😡</span><span class="emoji-item">👍</span>
      </div>
    </main>
  </div>

  <dialog id="profile-modal">
    <form method="dialog" class="card modal-card">
      <h2>Edit Profile</h2>
      <label>Profile picture
        <input id="profile-photo-file" type="file" accept="image/*" />
      </label>
      <img id="profile-photo-preview" class="profile-preview" src="https://placehold.co/96x96?text=Me" alt="Profile preview" />
      <label>Username<input id="profile-username" /></label>
      <label>Email<input id="profile-email" disabled /></label>
      <label>Phone number<input id="profile-phone" /></label>
      <label>Address<input id="profile-address" /></label>
      <div class="auth-buttons">
        <button type="button" id="save-profile-btn">Save</button>
        <button type="button" id="close-profile-btn" class="secondary">Close</button>
      </div>
    </form>
  </dialog>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <!-- On Firebase Hosting, this automatically initializes the correct project config. -->
  <script src="/__/firebase/init.js"></script>
  <script src="main.js"></script>
</body>
</html>
